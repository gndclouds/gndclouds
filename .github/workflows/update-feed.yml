name: Update Feed Data

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: "0 0 1 * *"
  # Allow manual triggering
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      # Submodule src/app/db holds journals, projects, notes, etc. update-feed reads
      # them from disk when NEXT_PUBLIC_CONTENT_MODE is not "remote" (the default).
      # Token must be a PAT with repo access to gndclouds/db if the submodule is private.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Update feed data (background job)
        run: npm run update-feed
        env:
          ARENA_ACCESS_KEY: ${{ secrets.ARENA_ACCESS_KEY }}
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_ACCESS_TOKEN }}
          FULL_IMPORT: "true"

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/feed.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Monthly feed data update [skip ci]" && git push)
